<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batu Gunting Kertas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎮 Batu Gunting Kertas</h1>
        
        <div class="game-info">
            <p>Pilih salah satu:</p>
            <div class="buttons">
                <button class="btn" onclick="main('batu')">🪨 Batu</button>
                <button class="btn" onclick="main('gunting')">✂️ Gunting</button>
                <button class="btn" onclick="main('kertas')">📄 Kertas</button>
            </div>
        </div>

        <div class="result">
            <p id="result-text"></p>
            <p id="score-text"></p>
        </div>

        <button class="btn-reset" onclick="reset()">Reset Game</button>
    </div>

    <!-- Audio Elements -->
    <audio id="winSound" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3"></audio>
    <audio id="loseSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>
    <audio id="tieSound" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
