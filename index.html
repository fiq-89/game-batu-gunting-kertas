<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batu Gunting Kertas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎮 Batu Gunting Kertas</h1>
        
        <div class="game-info">
            <p>Pilih salah satu:</p>
            <div class="buttons">
                <button class="btn" onclick="main('batu')">🪨 Batu</button>
                <button class="btn" onclick="main('gunting')">✂️ Gunting</button>
                <button class="btn" onclick="main('kertas')">📄 Kertas</button>
            </div>
        </div>

        <div class="result">
            <p id="result-text"></p>
            <p id="score-text"></p>
        </div>

        <button class="btn-reset" onclick="reset()">Reset Game</button>
    </div>

    <!-- Audio Elements -->
<audio id="winSound" src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_d5b6194e0f.mp3?filename=success_bell-14899.mp3"></audio>
<audio id="loseSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4e0e9b1c6a.mp3?filename=sad-trombone-1.mp3"></audio>
<audio id="tieSound" src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_6c1d6a62f0.mp3?filename=tada-fanfare-a-6713.mp3"></audio>
    <script src="script.js"></script>
</body>
</html>
